services:

  mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: cx
      MARIADB_USER: cx
      MARIADB_PASSWORD: cx
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: cx
      DB_PASSWORD: cx
      DB_NAME: cx
      REDIS_URL: redis://redis:6379
      # crosscheck starts its mock server on the host at port 9099.
      # host.docker.internal resolves to the host from inside the container.
      WEBHOOK_URL: "http://host.docker.internal:9099/"
    extra_hosts:
      # Required on Linux — Docker Desktop sets this automatically.
      - "host.docker.internal:host-gateway"
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
