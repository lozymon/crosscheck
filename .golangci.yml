version: "2"

linters:
  enable:
    - errcheck       # unhandled errors
    - govet          # go vet checks
    - staticcheck    # advanced static analysis
    - unused         # unused code
    - misspell       # common spelling mistakes
    - exhaustive     # missing switch cases on enums
    - noctx          # http requests without context
    - bodyclose      # unclosed http response bodies
    - wsl_v5         # blank lines around if/for/switch/return blocks

formatters:
  enable:
    - gofmt          # formatting
    - goimports      # import ordering

formatters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/lozymon/crosscheck

linters-settings:
  wsl_v5:
    allow-first-in-block: true
    allow-whole-block: false
    branch-max-lines: 2

issues:
  max-same-issues: 0
